name: Keep Supabase Alive

on:
  schedule:
    # Runs at 13:30 UTC (2:30 PM WAT) every Monday and Thursday
    - cron: '30 13 * * 1,4'
  workflow_dispatch:   # Allows you to manually trigger from the Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health endpoint
        run: |
          curl -v -X GET "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
