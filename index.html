    window.closeModal = () => {
        document.getElementById('studentModal').style.display = 'none';
    };

    // --- Backup & Restore Logic ---
    window.backupData = () => {
        const data = JSON.stringify(state);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attendance_system_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        showToast('System Backup Downloaded', 'success');
    };

    window.restoreData = (input) => {
        const file = input.files[0];
        if (!file) return;

        if (!confirm('WARNING: This will overwrite ALL current data with the backup file. Proceed?')) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const importedState = JSON.parse(e.target.result);
                if (!importedState.students || !importedState.attendance) {
                    throw new Error('Invalid backup file');
                }
                
                state = importedState;
                saveData();
                render();
                showToast('System Restored Successfully!', 'success');
                closeSidebar();
            } catch (err) {
                showToast('Error: Invalid backup file', 'danger');
            }
        };
        reader.readAsText(file);
    };

    window.printBarcodeSheet = () => {
        const sortedStudents = [...state.students].sort((a, b) => {
            const clsA = (a.class || '').toLowerCase();
            const clsB = (b.class || '').toLowerCase();
            if (clsA !== clsB) return clsA.localeCompare(clsB);
            return (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase());
        });

        const printWindow = window.open('', '_blank');
        if (!printWindow) {
            alert('Please allow popups to print barcodes.');
            return;
        }

        let html = `
            <html>
            <head>
                <title>Student Barcodes (Compact 5x6)</title>
                <style>
                    body { font-family: 'Inter', sans-serif; padding: 10px; background: white; color: black; }
                    .header-info { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
                    .sheet { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
                    .card { border: 1px solid #ddd; padding: 8px; border-radius: 6px; text-align: center; page-break-inside: avoid; }
                    .card img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
                    .name { font-weight: bold; margin-top: 5px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
                    .class { font-size: 9px; color: #555; margin-bottom: 3px; }
                    @media print { .no-print { display: none; } }
                </style>
            </head>
            <body>
                <div class="no-print" style="background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #cbd5e1;">
                    <h2 style="margin: 0 0 5px 0; color: #0f172a; font-size: 1.2rem;">Compact Print Sheet</h2>
                    <p style="margin: 0 0 10px 0; font-size: 12px;">5 Barcodes per row. Optimized for 30+ students per page.</p>
                    <button onclick="window.print()" style="padding: 8px 20px; font-size: 14px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: 600;">🖨️ Print Now</button>
                </div>
                <div class="header-info">
                    <h2 style="margin:0; font-size: 1.1rem;">Student ID Barcodes (Sorted by Class)</h2>
                </div>
                <div class="sheet">
        `;
        
        sortedStudents.forEach(s => {
            // Using scale=2 for a more compact height/width balance
            const barcodeUrl = `https://bwipjs-api.metafloor.com/?bcid=code128&text=${s.code}&scale=2&rotate=N&includetext`;
            html += `
                <div class="card">
                    <div class="class">${s.class}</div>
                    <img src="${barcodeUrl}">
                    <div class="name">${s.name}</div>
                </div>
            `;
        });
        
        html += `</div></body></html>`;
        printWindow.document.write(html);
        printWindow.document.close();
    };

    window.downloadCSV = () => {
        let csv = 'Name,Class,Code,Date,Status,In,Out\n';
        Object.keys(state.attendance).forEach(date => {
            state.students.forEach(s => {
                const log = state.attendance[date][s.id] || {};
                const status = log.in ? (log.late ? 'Late' : 'Present') : 'Absent';
                csv += `"${s.name}","${s.class}","${s.code}","${date}","${status}","${log.in || ''}","${log.out || ''}"\n`;
            });
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attendance_report_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    };


    // --- Navigation Logic ---
    function setupEventListeners() {
        // Mode Switches
        document.getElementById('kioskModeBtn').onclick = () => {
            state.ui.currentMode = 'kiosk';
            updateNavActive();
            render();
        };

        // Hamburger Menu Toggle
        document.getElementById('hamburgerBtn').onclick = openSidebar;
        document.getElementById('closeSidebarBtn').onclick = closeSidebar;
        document.getElementById('sidebarOverlay').onclick = closeSidebar;


        // Sidebar Menu Items
        document.getElementById('menuStudentManagement').onclick = () => { state.ui.adminSection = 'students'; render(); closeSidebar(); updateNavActive(); };
        document.getElementById('menuDailyAttendance').onclick = () => { state.ui.adminSection = 'attendance'; render(); closeSidebar(); updateNavActive(); };
        document.getElementById('menuSummary').onclick = () => { state.ui.adminSection = 'reports'; render(); closeSidebar(); updateNavActive(); };
        document.getElementById('menuExitAdmin').onclick = () => { 
            state.ui.currentMode = 'kiosk'; 
            closeSidebar();
            updateNavActive(); 
            render(); 
            showToast('Exited Admin Panel', 'primary'); 
        };
        document.getElementById('themeToggleBtn').onclick = () => { toggleTheme(); closeSidebar(); showToast(`Switched to ${state.config.theme} mode`, 'success'); };

        // QR Scanner Implementation
        let html5QrCode = null;

        document.getElementById('qrScanBtn').onclick = () => {
            vibrate(100);
            document.getElementById('scannerModal').style.display = 'flex';
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    // Success
                    vibrate(200);
                    
                    // Logic to toggle In/Out
                    state.ui.kioskCode = decodedText;
                    updateCodeDisplay();
                    stopScanner();
                    processAttendance();
                }
            ).catch(err => {
                showToast('Camera Error: ' + err, 'danger');
                stopScanner();
            });
        };

        window.stopScanner = () => {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerModal').style.display = 'none';
                    html5QrCode = null;
                }).catch(() => {
                    document.getElementById('scannerModal').style.display = 'none';
                });
            }
        };

        window.addEventListener('online', () => {
            updateSyncIndicator();
            tryPushPending();
        });
        window.addEventListener('offline', () => {
            updateSyncIndicator();
        });

        // Initialize sync indicator
        updateSyncIndicator();
    }

    function checkAdmin() {
        if (state.ui.currentMode !== 'admin') {
            const pass = prompt('Admin password required:');
            if (pass === ADMIN_PASS) {
                state.ui.currentMode = 'admin';
                return true;
            }
            showToast('Access Denied', 'danger');
            return false;
        }
        return true;
    }

    function updateNavActive() {
        // Show/Hide Hamburger based on mode
        const hamburger = document.getElementById('hamburgerBtn');
        if (hamburger) hamburger.style.display = state.ui.currentMode === 'admin' ? 'flex' : 'none';

        // Show/Hide Kiosk Switch based on mode (Only visible in Admin mode to allow switching back)
        const modeSwitch = document.querySelector('.mode-switch');
        if (modeSwitch) modeSwitch.style.display = state.ui.currentMode === 'admin' ? 'flex' : 'none';

        // Remove active class from all sidebar items
        document.querySelectorAll('.sidebar-menu-item').forEach(i => i.classList.remove('active'));
        
        if (state.ui.currentMode === 'admin') {
            if (state.ui.adminSection === 'students') document.getElementById('menuStudentManagement')?.classList.add('active');
            if (state.ui.adminSection === 'attendance') document.getElementById('menuDailyAttendance')?.classList.add('active');
            if (state.ui.adminSection === 'reports') document.getElementById('menuSummary')?.classList.add('active');
        }
    }

    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').style.display = 'block';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').style.display = 'none';
    }

    // Start App
    init();
</script>
</body>
</html>
